<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration Forms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-card" id="loginCard">
        <h2>Login Form</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Username:</label>
                <input type="text" name="username">
            </div>
            <div class="input-group">
                <label>Password:</label>
                <input type="password" name="password">
            </div>
            <div class="button-group">
                <button type="submit" class="btn-primary">Login</button>
                <button type="button" class="btn-danger" onclick="clearForm('loginForm')">Clear</button>
            </div>
            <a href="#" class="toggle-link" onclick="toggleForms()">Create New Account</a>
        </form>
    </div>

    <div class="form-card registration-card" id="registerCard" style="display: none;">
        <h2>Registration Form</h2>
        <form id="registerForm">
            <div class="row">
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>Department</label>
                    <select>
                        <option>Computer Science</option>
                        <option>Information Technology</option>
                        <option>Engineering</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Gender</label>
                    <div class="options">
                        <label><input type="radio" name="gender"> Male</label>
                        <label><input type="radio" name="gender"> Female</label>
                        <label><input type="radio" name="gender"> Other</label>
                    </div>
                </div>
                <div class="input-group">
                    <label>Hobbies</label>
                    <div class="options">
                        <label><input type="checkbox"> Reading</label>
                        <label><input type="checkbox"> Sports</label>
                        <label><input type="checkbox"> Music</label>
                        <label><input type="checkbox"> Travel</label>
                    </div>
                </div>
                <div class="input-group">
                    <label>Others</label>
                    <textarea rows="4"></textarea>
                </div>
            </div>

            <div class="button-group center">
                <button type="submit" class="btn-primary">Register</button>
                <button type="button" class="btn-danger" onclick="clearForm('registerForm')">Clear</button>
            </div>
            <a href="#" class="toggle-link" onclick="toggleForms()">Already have an account? Login</a>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
